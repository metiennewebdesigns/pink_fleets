name: rider_app
description: "Pink Fleets Rider Application"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter

  pf_ui:
    path: ../pf_ui
  google_fonts: ^6.2.1

  flutter_riverpod: ^2.6.1
  go_router: ^14.8.1

  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  cloud_firestore: ^5.4.4
  cloud_functions: ^5.1.1
  firebase_storage: ^12.3.0
  file_picker: ^8.1.2

  firebase_messaging: ^15.1.0

  http: ^1.2.2
  flutter_typeahead: ^5.2.0
  intl: ^0.19.0
  url_launcher: ^6.3.1
  google_sign_in: ^6.2.1
  google_maps_flutter: ^2.6.1

  flutter_stripe: ^11.0.0
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true
  assets:
    - assets/logo/

flutter_launcher_icons:
  android: true
  ios: true
  image_path: assets/logo/pink_fleets_logo.png
  remove_alpha_ios: true
  web:
    generate: true
    image_path: assets/logo/pink_fleets_logo.png
    background_color: "#ffffff"
    theme_color: "#111111"
  windows:
    generate: true
    image_path: assets/logo/pink_fleets_logo.png
    icon_size: 48
  macos:
    generate: true
    image_path: assets/logo/pink_fleets_logo.png