name: dispatcher_web
description: Pink Fleets Dispatcher Portal
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ">=3.2.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # UI
  pf_ui:
    path: ../pf_ui
  google_fonts: ^6.2.1
  cupertino_icons: ^1.0.8

  # State & Routing
  flutter_riverpod: ^2.6.1
  go_router: ^14.8.1

  # Firebase
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  cloud_firestore: ^5.4.4
  cloud_functions: ^5.1.1
  firebase_messaging: ^15.2.10
  firebase_storage: ^12.3.7
  pdf: ^3.11.0
  printing: ^5.12.0
  http: ^1.2.2
  google_maps_flutter: ^2.6.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true
  assets:
    - assets/logo/
    - assets/images/

flutter_launcher_icons:
  android: true
  ios: true
  image_path: assets/logo/pink_fleets_logo.png
  remove_alpha_ios: true
  web:
    generate: true
    image_path: assets/logo/pink_fleets_logo.png
    background_color: "#ffffff"
    theme_color: "#111111"
  windows:
    generate: true
    image_path: assets/logo/pink_fleets_logo.png
    icon_size: 48
  macos:
    generate: true
    image_path: assets/logo/pink_fleets_logo.png