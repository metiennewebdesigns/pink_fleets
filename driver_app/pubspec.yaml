name: driver_app
description: Pink Fleets Driver Application
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ">=3.2.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # UI
  pf_ui:
    path: ../pf_ui
  google_fonts: ^6.2.1
  cupertino_icons: ^1.0.8

  # State & Routing
  flutter_riverpod: ^2.6.1
  go_router: ^14.8.1

  # Firebase
  firebase_core: ^3.6.0
  firebase_core_web: ^2.24.1
  firebase_auth: ^5.3.1
  firebase_auth_web: ^5.15.3
  cloud_firestore: ^5.4.4
  cloud_firestore_web: ^4.4.12
  firebase_storage: ^12.3.7
  firebase_storage_web: ^3.10.17
  cloud_functions: ^5.1.1
  http: ^1.2.2
  http_parser: ^4.0.2
  image: ^4.2.0
  firebase_messaging: ^15.2.10
  intl: ^0.19.0
  file_picker: ^8.1.2
  image_picker: ^1.1.2
  video_player: ^2.9.5
  google_maps_flutter: ^2.6.1
  flutter_map: ^7.0.0
  latlong2: ^0.9.1

  # Location
  geolocator: ^13.0.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true
  assets:
    - assets/logo/
    - assets/images/

flutter_launcher_icons:
  android: true
  ios: true
  image_path: assets/logo/pink_fleets_logo.png
  remove_alpha_ios: true
  web:
    generate: true
    image_path: assets/logo/pink_fleets_logo.png
    background_color: "#ffffff"
    theme_color: "#111111"
  windows:
    generate: true
    image_path: assets/logo/pink_fleets_logo.png
    icon_size: 48
  macos:
    generate: true
    image_path: assets/logo/pink_fleets_logo.png